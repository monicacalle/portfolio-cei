<!-- contact section -->
<section class="contact" id="contact">
    <div class="contact__wrapper">
        <div class="contact__intro">
            <span class="contact__eyebrow">Contact</span>
            <h2 class="contact__title">Let’s create something thoughtful together.</h2>
            <p class="contact__lead">
                If you have a project, collaboration, or role in mind, I would love to hear from you.
            </p>
            <a class="contact__mail" href="mailto:monicacalle369@gmail.com">monicacalle369@gmail.com</a>

            <div class="contact__tags">
                <span class="contact__tag">Front-End Development</span>
                <span class="contact__tag">UI Design</span>
                <span class="contact__tag">Creative Direction</span>
            </div>
        </div>

        <form class="contact__form" action="/send-form" method="post">
            <div class="contact__row">
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="first-name">First name</label>
                        <input class="contact__input" id="first-name" type="text" name="first-name" required /><span class="contact__span-text"
                            >First name</span
                        >
                        <span class="contact__span-line"></span>
                    </div>
                </div>
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="last-name">Last name</label>
                        <input id="last-name" type="text" name="last-name" required class="contact__input" />
                        <span class="contact__span-text">Last name</span>
                        <span class="contact__span-line"></span>
                    </div>
                </div>
            </div>
            <div class="contact__row">
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="email">Email</label>
                        <input id="email" type="email" name="email" required class="contact__input" />
                        <span class="contact__span-text">E-mail</span>
                        <span class="contact__span-line"></span>
                    </div>
                </div>
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="mobile">Mobile</label>
                        <input id="mobile" class="contact__input" type="tel" name="telefono" required />
                        <span class="contact__span-text">Mobile </span>
                        <span class="contact__span-line"></span>
                    </div>
                </div>
            </div>
            <div class="contact__row">
                <div class="contact__col">
                    <div class="contact__box-input">
                        <label class="contact__label visually-hidden" for="message">Message</label>
                        <textarea class="textarea" name="message" id="message" cols="30" rows="10" required></textarea>
                        <span class="contact__span-text">Type your message here...</span>
                        <span class="contact__span-line"></span>
                    </div>
                </div>
            </div>
            <div class="contact__row">
                <div class="contact__col">
                    <button class="contact__btn" type="submit" title="Click to send your message">Send</button>
                </div>
            </div>
        </form>
    </div>
</section>
