<!-- home section -->
<section class="home" id="home">
  <div class="home__wrapper">
    <picture>
      <source
        srcset="/assets/images/backgroundhero.webp"
        media="(min-width: 769px)"
        type="image/png"
      />
      <img
        class="about__img"
        src="/assets/images/backgroundhero.webp"
        alt="Profile picture"
        loading="lazy"
      />
    </picture>

    <h1 class="home__title">I´m Mónica Calle</h1>
    <h3 class="home__text-animation">
      and I'm a <span class="home__span"></span>
    </h3>
    <div class="home__social-icons">
      <a
        target="_blank"
        rel="noreferrer"
        title="Visit my LinkedIn profile"
        href="https://www.linkedin.com/in/monica-calle-betancourt/"
      >
        <svg class="home__icon" title="LinkedIn">
          <use href="#icon-linkedin"></use>
        </svg>
      </a>
      <a
        target="_blank"
        rel="noreferrer"
        title="Visit my GitHub profile"
        href="https://github.com/monicacalle"
      >
        <svg class="home__icon" title="Github">
          <use href="#icon-github"></use>
        </svg>
      </a>
      <a
        target="_blank"
        rel="noreferrer"
        title="Visit my Instagram profile"
        href="https://www.instagram.com/monica_calle_b/"
      >
        <svg class="home__icon" title="Instagram">
          <use href="#icon-instagram"></use>
        </svg>
      </a>
    </div>

    <div class="home__btn-group">
      <a href="#about" class="home__btn" title="Learn more about me"
        >About me</a
      >

      <a href="#contact" class="home__btn" title="Get in touch with me"
        >Contact
      </a>
    </div>
  </div>
</section>
